# Production Deployment Workflow
# Deploys frontend to Firebase Hosting
# on every merge to main, after CI passes.
#
# Prerequisites:
#   1. Run scripts/setup-wif.sh (one-time)
#   2. Add GitHub secrets: GCP_PROJECT_ID, GCP_WORKLOAD_IDENTITY_PROVIDER, GCP_SERVICE_ACCOUNT

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Prevent concurrent deployments
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '22'
  REGION: 'northamerica-northeast1'
  GCS_BUCKET: 'toast-stats-data-ca'

permissions:
  contents: write # Required to push version tags
  id-token: write # Required for Workload Identity Federation
  packages: write # Required by CI workflow
  pull-requests: write # Required by CI workflow
  security-events: write # Required by CI workflow

jobs:
  # ──────────────────────────────────────────────
  # Gate: CI must pass before deployment
  # ──────────────────────────────────────────────
  ci:
    name: CI Quality Gates
    uses: ./.github/workflows/ci.yml

  # ──────────────────────────────────────────────
  # Deploy Frontend to Firebase Hosting
  # ──────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: [ci]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build dependency packages
        run: |
          npm run build:shared-contracts
          npm run build:analytics-core

      - name: Read version from package.json
        id: pkg
        run: echo "version=$(node -p 'require(\"./package.json\").version')" >> "$GITHUB_OUTPUT"

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Build and deploy staging
        run: |
          npm run build:frontend
          npm install -g firebase-tools
          firebase deploy --only hosting:staging --project ${{ secrets.GCP_PROJECT_ID }}
        env:
          VITE_APP_VERSION: v${{ steps.pkg.outputs.version }}
          VITE_CDN_BASE_URL: https://storage.googleapis.com/toast-stats-data-staging

      - name: Build and deploy production
        run: |
          npm run build:frontend
          firebase deploy --only hosting:production --project ${{ secrets.GCP_PROJECT_ID }}
        env:
          VITE_APP_VERSION: v${{ steps.pkg.outputs.version }}

      - name: Record DORA deploy metrics
        if: success()
        run: |
          DEPLOY_TIME=$(date -u +%s)
          COMMIT_TIME=$(git log -1 --format=%ct)
          LEAD_TIME=$((DEPLOY_TIME - COMMIT_TIME))
          VERSION="${{ steps.pkg.outputs.version }}"
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          cat <<METRICS_EOF > /tmp/deploy-metrics.json
          {
            "timestamp": "${TIMESTAMP}",
            "commitSha": "${GITHUB_SHA}",
            "leadTimeSeconds": ${LEAD_TIME},
            "deploySuccess": true,
            "version": "v${VERSION}",
            "actor": "${GITHUB_ACTOR}",
            "runId": ${GITHUB_RUN_ID}
          }
          METRICS_EOF

          gsutil \
            -h "Content-Type:application/json" \
            cp /tmp/deploy-metrics.json \
            "gs://${{ env.GCS_BUCKET }}/metrics/deploys/$(date -u +%Y-%m-%d_%H%M%S).json"

          echo "## 📊 DORA Metrics" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Lead time**: ${LEAD_TIME}s (commit → deploy)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version**: v${VERSION}" >> "$GITHUB_STEP_SUMMARY"

  # ──────────────────────────────────────────────
  # Post-Deployment Verification
  # ──────────────────────────────────────────────
  post-deploy-verify:
    name: Post-Deploy Verification
    runs-on: ubuntu-latest
    needs: [deploy-frontend]

    steps:
      - name: Wait for services to stabilize
        run: sleep 30

      - name: Health check
        run: |
          echo "## Post-Deployment Verification" >> "$GITHUB_STEP_SUMMARY"

          # Check CDN is serving data
          CDN_URL="https://cdn.taverns.red"

          echo "Checking CDN at ${CDN_URL}/v1/latest.json..."
          RESPONSE=$(curl -sf --max-time 30 "${CDN_URL}/v1/latest.json" || true)

          if echo "${RESPONSE}" | grep -q 'latestSnapshotDate'; then
            echo "✅ CDN health check passed" >> "$GITHUB_STEP_SUMMARY"
            echo "Response: ${RESPONSE}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "⚠️ CDN health check returned unexpected response" >> "$GITHUB_STEP_SUMMARY"
            echo "Response: ${RESPONSE:-'(no response)'}" >> "$GITHUB_STEP_SUMMARY"
            echo "::warning::CDN health check did not return expected response. Manual verification recommended."
          fi

      - name: Deployment summary
        run: |
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "---" >> "$GITHUB_STEP_SUMMARY"
          echo "🚀 Deployment complete for commit \`${GITHUB_SHA::7}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Frontend**: https://${{ secrets.GCP_PROJECT_ID }}.web.app" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Triggered by**: @${GITHUB_ACTOR}" >> "$GITHUB_STEP_SUMMARY"
