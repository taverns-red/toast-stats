# Unified Data Pipeline Workflow (#191)
#
# Modes:
#   daily    — scrape → transform → compute-analytics → upload ONE date (default, cron)
#   rebuild  — sync all raw-csv from GCS → rebuild ALL dates → upload ALL snapshots
#   rescrape — re-collect CSVs from the dashboard for specific dates or a program year
#   prune    — remove non-month-end dates from local cache and GCS
#
# Prerequisites:
#   1. Run scripts/setup-wif.sh (one-time)
#   2. Add GitHub secrets: GCP_PROJECT_ID, GCP_WORKLOAD_IDENTITY_PROVIDER, GCP_SERVICE_ACCOUNT
#
# The collector uses Playwright (chromium) to scrape Toastmasters dashboards.
# Data is processed locally and uploaded to GCS for the frontend to consume.

name: Data Pipeline

on:
  schedule:
    # Run daily at 10:00 UTC (5 AM EST / 6 AM EDT)
    - cron: '0 10 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Pipeline mode'
        required: true
        type: choice
        options:
          - daily
          - rebuild
          - rescrape
          - rescrape-historical
          - prune
        default: daily
      date:
        description: 'Target date (YYYY-MM-DD). Daily: scrape date. Rebuild: ignored unless dates specified.'
        required: false
        type: string
      dates:
        description: 'Rebuild/rescrape: comma-separated dates (default: all in raw-csv/ for rebuild)'
        required: false
        type: string
      program_year:
        description: 'Rescrape only: program year (e.g. 2025-2026). Generates monthly dates automatically.'
        required: false
        type: string
      districts:
        description: 'Comma-separated district IDs (e.g. 57,58,59), defaults to all'
        required: false
        type: string
      force:
        description: 'Force re-scrape/recompute even if cache exists'
        required: false
        type: boolean
        default: false
      dry_run:
        description: 'Prune only: classify and report without deleting'
        required: false
        type: boolean
        default: false

# Prevent overlapping pipeline runs
concurrency:
  group: data-pipeline
  cancel-in-progress: false

env:
  NODE_VERSION: '22'
  # Daily pipeline writes to staging first; promotion copies to production (#316)
  GCS_BUCKET: 'toast-stats-data-staging'
  GCS_BUCKET_PRODUCTION: 'toast-stats-data-ca'

permissions:
  contents: read
  id-token: write # Required for Workload Identity Federation

jobs:
  pipeline:
    name: '${{ inputs.mode || ''daily'' }} pipeline'
    runs-on: ubuntu-latest
    # Rebuild needs more time (110+ dates × ~1 min each + GCS sync)
    timeout-minutes: ${{ (inputs.mode == 'rebuild' || inputs.mode == 'rescrape' || inputs.mode == 'rescrape-historical') && 240 || 30 }}

    steps:
      # ── Setup ────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: |
          npm run build --workspace=@toastmasters/shared-contracts
          npm run build --workspace=@toastmasters/analytics-core
          npm run build --workspace=@toastmasters/collector-cli

      - name: Install Playwright browsers
        if: inputs.mode == 'daily' || inputs.mode == '' || github.event_name == 'schedule'
        run: npx playwright install chromium --with-deps

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Determine mode
        id: mode
        run: |
          MODE="${{ inputs.mode || 'daily' }}"
          echo "mode=${MODE}" >> "$GITHUB_OUTPUT"
          echo "## 🔧 Pipeline Mode: \`${MODE}\`" >> "$GITHUB_STEP_SUMMARY"

      # ════════════════════════════════════════════════════════
      # DAILY MODE
      # ════════════════════════════════════════════════════════

      # ── Daily Step 1: Discover districts + sync raw-csv cache ──
      - name: '[daily] Discover districts and sync raw-csv'
        if: steps.mode.outputs.mode == 'daily'
        id: daily-config
        run: |
          # Toastmasters dashboard is always one day behind — use yesterday
          TARGET_DATE="${{ inputs.date || '' }}"
          if [ -z "${TARGET_DATE}" ]; then
            TARGET_DATE=$(date -u -d '1 day ago' +%Y-%m-%d)
          fi
          echo "Target date: ${TARGET_DATE}"

          # If districts were manually specified, use them directly
          if [ -n "${{ inputs.districts }}" ]; then
            DISTRICTS="${{ inputs.districts }}"
            echo "Using manual district override: ${DISTRICTS}"
          else
            # Auto-discover districts from the Toastmasters districtsummary CSV
            PROGRAM_YEAR=$(node -e "
              const d = new Date('${TARGET_DATE}');
              const y = d.getFullYear(); const m = d.getMonth();
              console.log(m >= 6 ? y+'-'+(y+1) : (y-1)+'-'+y);
            ")
            DATE_FORMATTED=$(date -d "${TARGET_DATE}" +'%-m/%-d/%Y')
            DISTRICTS_CSV_URL="https://dashboards.toastmasters.org/${PROGRAM_YEAR}/export.aspx?type=CSV&report=districtsummary~${DATE_FORMATTED}~~${PROGRAM_YEAR}"

            echo "Discovering districts from: ${DISTRICTS_CSV_URL}"
            DISTRICTS=$(curl -sf --retry 3 --max-time 30 "${DISTRICTS_CSV_URL}" | node -e "
              const data = require('fs').readFileSync('/dev/stdin','utf8');
              const lines = data.trim().split('\n');
              const headers = lines[0].split(',').map(h => h.replace(/\"/g,'').trim());
              const col = headers.indexOf('DISTRICT');
              const ids = [...new Set(lines.slice(1)
                .map(l => l.split(',')[col].replace(/\"/g,'').trim())
                .filter(id => /^[A-Z0-9]+$/i.test(id)))];
              ids.sort((a,b) => { const na=parseInt(a,10),nb=parseInt(b,10); return isNaN(na)||isNaN(nb)?a.localeCompare(b):na-nb; });
              process.stdout.write(ids.join(','));
            ")

            if [ -z "${DISTRICTS}" ]; then
              echo "::error::Failed to discover districts from Toastmasters CSV."
              exit 1
            fi
            echo "Discovered $(echo "${DISTRICTS}" | tr ',' '\n' | wc -l | tr -d ' ') districts"
          fi

          echo "districts=${DISTRICTS}" >> "$GITHUB_OUTPUT"
          echo "date=${TARGET_DATE}" >> "$GITHUB_OUTPUT"

          # Sync raw-csv cache for target date
          mkdir -p "./cache/raw-csv/${TARGET_DATE}"
          gsutil -m rsync -r \
            "gs://${GCS_BUCKET}/raw-csv/${TARGET_DATE}/" \
            "./cache/raw-csv/${TARGET_DATE}/" \
            2>&1 || echo "No existing raw-csv for ${TARGET_DATE} in GCS (first run)"

          echo "## ⏬ District Discovery & Raw CSV Sync" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Districts**: ${DISTRICTS}" >> "$GITHUB_STEP_SUMMARY"
          FILE_COUNT=$(find "./cache/raw-csv/${TARGET_DATE}" -name '*.csv' 2>/dev/null | wc -l | tr -d ' ')
          echo "- **Date**: ${TARGET_DATE}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **CSV files restored**: ${FILE_COUNT}" >> "$GITHUB_STEP_SUMMARY"

      # ── Daily Step 2: Scrape + Transform ──
      - name: '[daily] Scrape & Transform'
        if: steps.mode.outputs.mode == 'daily'
        id: daily-scrape
        env:
          TOASTMASTERS_DASHBOARD_URL: 'https://dashboards.toastmasters.org'
        run: |
          ARGS="--transform --verbose"
          if [ -n "${{ inputs.date }}" ]; then
            ARGS="$ARGS --date ${{ inputs.date }}"
          else
            ARGS="$ARGS --date $(date -u -d '1 day ago' +%Y-%m-%d)"
          fi
          DISTRICT_LIST="${{ steps.daily-config.outputs.districts }}"
          ARGS="$ARGS --districts ${DISTRICT_LIST}"
          if [ "${{ inputs.force }}" = "true" ]; then
            ARGS="$ARGS --force"
          fi

          echo "Running: npx collector-cli scrape $ARGS"
          npx collector-cli scrape $ARGS | tee /tmp/scrape-output.json

          DATE=$(jq -r '.date' /tmp/scrape-output.json)
          # Snapshot date may differ from raw date after closing-period remap (#309)
          SNAPSHOT_DATE=$(jq -r '.snapshotDate // .date' /tmp/scrape-output.json)
          echo "date=${DATE}" >> "$GITHUB_OUTPUT"
          echo "snapshot_date=${SNAPSHOT_DATE}" >> "$GITHUB_OUTPUT"
          if [ "${DATE}" != "${SNAPSHOT_DATE}" ]; then
            echo "Closing period detected: raw date ${DATE} → snapshot ${SNAPSHOT_DATE}"
          fi

          echo "## 📥 Scrape Results" >> "$GITHUB_STEP_SUMMARY"
          SUCCEEDED=$(jq '.districts.succeeded' /tmp/scrape-output.json)
          FAILED=$(jq '.districts.failed' /tmp/scrape-output.json)
          echo "- **Date**: ${DATE}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Districts succeeded**: ${SUCCEEDED}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Districts failed**: ${FAILED}" >> "$GITHUB_STEP_SUMMARY"

      # ── Daily Step 3: Sync accumulated stores from GCS ──
      - name: '[daily] Sync time-series, club-trends, prev-year from GCS'
        if: steps.mode.outputs.mode == 'daily'
        run: |
          DATE="${{ steps.daily-scrape.outputs.date }}"

          # Time-series index (~344 KB)
          echo "Syncing time-series..."
          mkdir -p ./cache/time-series
          gsutil -m rsync -r "gs://${GCS_BUCKET}/time-series/" "./cache/time-series/" 2>&1 || true

          # Club-trends store (~50 KB/district)
          echo "Syncing club-trends..."
          mkdir -p ./cache/club-trends
          gsutil -m rsync -r "gs://${GCS_BUCKET}/club-trends/" "./cache/club-trends/" 2>&1 || true

          # Previous year snapshots for YoY comparison
          PREV_YEAR=$(date -d "${DATE} - 1 year" +%Y-%m-%d)
          echo "Syncing previous year snapshots (${PREV_YEAR})..."
          mkdir -p "./cache/snapshots/${PREV_YEAR}"
          gsutil -m cp "gs://${GCS_BUCKET}/snapshots/${PREV_YEAR}/district_*.json" \
            "./cache/snapshots/${PREV_YEAR}/" 2>/dev/null || true

          echo "## ⏬ Store Sync" >> "$GITHUB_STEP_SUMMARY"
          TS_COUNT=$(find ./cache/time-series -name '*.json' 2>/dev/null | wc -l | tr -d ' ')
          CT_COUNT=$(find ./cache/club-trends -name '*.json' 2>/dev/null | wc -l | tr -d ' ')
          PREV_COUNT=$(find "./cache/snapshots/${PREV_YEAR}" -name 'district_*.json' 2>/dev/null | wc -l | tr -d ' ')
          echo "- **Time-series files**: ${TS_COUNT}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Club-trends files**: ${CT_COUNT}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Prev-year snapshots**: ${PREV_COUNT}" >> "$GITHUB_STEP_SUMMARY"

      # ── Daily Step 4: Compute Analytics ──
      - name: '[daily] Compute Analytics'
        if: steps.mode.outputs.mode == 'daily'
        run: |
          DATE="${{ steps.daily-scrape.outputs.date }}"
          if [ -z "${DATE}" ]; then
            DATE="${{ steps.daily-config.outputs.date }}"
            echo "::warning::Scrape step did not output a date; using config date: ${DATE}"
          fi
          DISTRICT_LIST="${{ steps.daily-config.outputs.districts }}"
          ARGS="--date ${DATE} --districts ${DISTRICT_LIST} --verbose"

          echo "Running: npx collector-cli compute-analytics $ARGS"
          npx collector-cli compute-analytics $ARGS | tee /tmp/analytics-output.json

          echo "## 📊 Analytics Results" >> "$GITHUB_STEP_SUMMARY"
          SUCCEEDED=$(jq '.districts.succeeded' /tmp/analytics-output.json)
          echo "- **Districts computed**: ${SUCCEEDED}" >> "$GITHUB_STEP_SUMMARY"

      # ── Daily Step 5: Upload to GCS ──
      - name: '[daily] Upload to GCS'
        if: steps.mode.outputs.mode == 'daily'
        run: |
          DATE="${{ steps.daily-scrape.outputs.date }}"
          # Use the actual snapshot date (post closing-period remap) for snapshot upload (#309)
          SNAPSHOT_DATE="${{ steps.daily-scrape.outputs.snapshot_date }}"
          if [ -z "${SNAPSHOT_DATE}" ]; then
            SNAPSHOT_DATE="${DATE}"
          fi
          echo "Uploading daily data — raw=${DATE}, snapshot=${SNAPSHOT_DATE}"

          # Internal state: rsync (no CDN metadata needed)
          # raw-csv keyed by collection date (DATE), not snapshot date
          gsutil -m rsync -r "./cache/raw-csv/${DATE}/" "gs://${GCS_BUCKET}/raw-csv/${DATE}/"
          gsutil -m rsync -r "./cache/time-series/" "gs://${GCS_BUCKET}/time-series/"
          gsutil -m rsync -r "./cache/club-trends/" "gs://${GCS_BUCKET}/club-trends/"

          # Time-series: CDN-served overlay (mutable, short cache)
          # rsync above keeps internal state; -m cp -rZ adds CDN headers + gzip in parallel
          gsutil -m \
            -h "Content-Type:application/json" \
            -h "Cache-Control:public, max-age=3600" \
            cp -rZ ./cache/time-series/* "gs://${GCS_BUCKET}/time-series/"

          # CDN-served: snapshots + analytics (immutable, gzipped)
          # Use SNAPSHOT_DATE for the actual snapshot directory (#309)
          gsutil -m \
            -h "Content-Type:application/json" \
            -h "Cache-Control:public, max-age=3600, must-revalidate" \
            cp -Z \
            "./cache/snapshots/${SNAPSHOT_DATE}"/*.json \
            "gs://${GCS_BUCKET}/snapshots/${SNAPSHOT_DATE}/"

          # Analytics subdirectory
          if [ -d "./cache/snapshots/${SNAPSHOT_DATE}/analytics" ]; then
            gsutil -m \
              -h "Content-Type:application/json" \
              -h "Cache-Control:public, max-age=3600, must-revalidate" \
              cp -Z \
              "./cache/snapshots/${SNAPSHOT_DATE}/analytics"/*.json \
              "gs://${GCS_BUCKET}/snapshots/${SNAPSHOT_DATE}/analytics/"
          fi

          echo "## ☁️ GCS Upload" >> "$GITHUB_STEP_SUMMARY"
          SNAPSHOT_COUNT=$(find "./cache/snapshots/${SNAPSHOT_DATE}" -name '*.json' 2>/dev/null | wc -l | tr -d ' ')
          echo "- **Raw date**: ${DATE}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Snapshot date**: ${SNAPSHOT_DATE}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Snapshot/analytics files**: ${SNAPSHOT_COUNT}" >> "$GITHUB_STEP_SUMMARY"

      # ════════════════════════════════════════════════════════
      # REBUILD MODE
      # ════════════════════════════════════════════════════════
      # Streams one date at a time to stay within runner disk
      # limits (~14 GB free). Each iteration: download raw-csv →
      # transform → compute → upload → cleanup.
      # Time-series + club-trends persist across iterations (small).

      # ── Rebuild Step 1: Sync small stores from GCS ──
      - name: '[rebuild] Sync time-series and club-trends from GCS'
        if: steps.mode.outputs.mode == 'rebuild'
        run: |
          # These are small (~344 KB + ~50 KB/district) and persist across dates
          echo "Syncing time-series..."
          mkdir -p ./cache/time-series
          gsutil -m rsync -r "gs://${GCS_BUCKET}/time-series/" "./cache/time-series/" 2>&1 || true

          echo "Syncing club-trends..."
          mkdir -p ./cache/club-trends
          gsutil -m rsync -r "gs://${GCS_BUCKET}/club-trends/" "./cache/club-trends/" 2>&1 || true

          echo "## ⏬ Store Sync (rebuild)" >> "$GITHUB_STEP_SUMMARY"
          TS_COUNT=$(find ./cache/time-series -name '*.json' 2>/dev/null | wc -l | tr -d ' ')
          CT_COUNT=$(find ./cache/club-trends -name '*.json' 2>/dev/null | wc -l | tr -d ' ')
          echo "- **Time-series files**: ${TS_COUNT}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Club-trends files**: ${CT_COUNT}" >> "$GITHUB_STEP_SUMMARY"

      # ── Rebuild Step 2: Discover dates, then stream one-at-a-time ──
      - name: '[rebuild] Stream rebuild — one date at a time'
        if: steps.mode.outputs.mode == 'rebuild'
        run: |
          # Determine which dates to rebuild
          if [ -n "${{ inputs.dates }}" ]; then
            DATES=$(echo "${{ inputs.dates }}" | tr ',' '\n' | sort)
            echo "Rebuilding specific dates: ${{ inputs.dates }}"
          else
            # Discover all dates from GCS raw-csv/
            DATES=$(gsutil ls "gs://${GCS_BUCKET}/raw-csv/" | grep -oP '\d{4}-\d{2}-\d{2}' | sort -u)
            echo "Discovered dates from GCS raw-csv/"
          fi

          DATE_COUNT=$(echo "${DATES}" | wc -l | tr -d ' ')
          echo "Total dates to rebuild: ${DATE_COUNT}"
          echo "## 🔨 Rebuild (streaming)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Dates to process**: ${DATE_COUNT}" >> "$GITHUB_STEP_SUMMARY"

          SUCCEEDED=0
          FAILED=0
          INDEX=0

          for DATE in ${DATES}; do
            INDEX=$((INDEX + 1))
            echo ""
            echo "═══════════════════════════════════════"
            echo "[${INDEX}/${DATE_COUNT}] Processing ${DATE}"
            echo "═══════════════════════════════════════"

            # 1. Download this date's raw-csv from GCS
            mkdir -p "./cache/raw-csv/${DATE}"
            gsutil -m rsync -r \
              "gs://${GCS_BUCKET}/raw-csv/${DATE}/" \
              "./cache/raw-csv/${DATE}/" 2>&1 || true

            # 2. Download previous-year snapshot for YoY (if needed)
            PREV_YEAR_DATE=$(date -d "${DATE} - 1 year" +%Y-%m-%d 2>/dev/null || echo "")
            if [ -n "${PREV_YEAR_DATE}" ] && [ ! -d "./cache/snapshots/${PREV_YEAR_DATE}" ]; then
              mkdir -p "./cache/snapshots/${PREV_YEAR_DATE}"
              gsutil -m cp \
                "gs://${GCS_BUCKET}/snapshots/${PREV_YEAR_DATE}/district_*.json" \
                "./cache/snapshots/${PREV_YEAR_DATE}/" 2>/dev/null || true
            fi

            # 3. Snapshot existing dirs before transform (#193)
            BEFORE_DIRS=$(ls -d ./cache/snapshots/????-??-?? 2>/dev/null | sort || true)

            # 4. Transform raw-csv → snapshots
            echo "Transforming ${DATE}..."
            if ! npx collector-cli transform --date "${DATE}" --force --verbose 2>&1; then
              echo "::warning::Transform failed for ${DATE}"
              FAILED=$((FAILED + 1))
              rm -rf "./cache/raw-csv/${DATE}"
              continue
            fi

            # 5. Detect actual snapshot date (#193)
            # The transformer remaps dates via the CSV "As of" header, so the
            # snapshot directory may differ from the raw-csv date.
            AFTER_DIRS=$(ls -d ./cache/snapshots/????-??-?? 2>/dev/null | sort || true)
            ACTUAL_DATE=$(comm -13 <(echo "$BEFORE_DIRS") <(echo "$AFTER_DIRS") \
                          | head -1 | grep -oP '\d{4}-\d{2}-\d{2}' || true)
            ACTUAL_DATE="${ACTUAL_DATE:-$DATE}"
            if [ "$ACTUAL_DATE" != "$DATE" ]; then
              echo "Date remapped: ${DATE} → ${ACTUAL_DATE}"
            fi

            # 6. Compute analytics (using actual snapshot date)
            echo "Computing analytics for ${ACTUAL_DATE}..."
            if ! npx collector-cli compute-analytics --date "${ACTUAL_DATE}" --force-analytics --verbose 2>&1; then
              echo "::warning::Compute failed for ${ACTUAL_DATE}"
              FAILED=$((FAILED + 1))
              # Still upload whatever snapshots were generated
            fi

            # 7. Upload this date's snapshots + analytics to GCS
            SNAPSHOT_DIR="./cache/snapshots/${ACTUAL_DATE}"
            if [ -d "${SNAPSHOT_DIR}" ]; then
              FILE_COUNT=$(find "${SNAPSHOT_DIR}" -name '*.json' 2>/dev/null | wc -l | tr -d ' ')
              echo "Uploading snapshots/${ACTUAL_DATE}/ (${FILE_COUNT} files)..."
              gsutil -m \
                -h "Content-Type:application/json" \
                -h "Cache-Control:public, max-age=3600, must-revalidate" \
                cp -Z \
                "${SNAPSHOT_DIR}"/*.json \
                "gs://${GCS_BUCKET}/snapshots/${ACTUAL_DATE}/"

              if [ -d "${SNAPSHOT_DIR}/analytics" ]; then
                gsutil -m \
                  -h "Content-Type:application/json" \
                  -h "Cache-Control:public, max-age=3600, must-revalidate" \
                  cp -Z \
                  "${SNAPSHOT_DIR}/analytics"/*.json \
                  "gs://${GCS_BUCKET}/snapshots/${ACTUAL_DATE}/analytics/"
              fi
              SUCCEEDED=$((SUCCEEDED + 1))
            else
              echo "::warning::No snapshot directory found for ${DATE} (expected ${ACTUAL_DATE})"
            fi

            # 8. Cleanup to free disk (keep time-series + club-trends)
            # Also remove previous-year snapshot dir to prevent orphan dirs
            # from polluting LATEST_DATE resolution (#295)
            rm -rf "./cache/raw-csv/${DATE}" "./cache/snapshots/${ACTUAL_DATE}" \
              ${PREV_YEAR_DATE:+"./cache/snapshots/${PREV_YEAR_DATE}"}

            # Report disk usage every 10 dates
            if [ $((INDEX % 10)) -eq 0 ]; then
              echo "Disk usage after ${INDEX} dates: $(df -h . | tail -1 | awk '{print $3 " used / " $4 " free"}')"
            fi
          done

          # Sync accumulated stores back to GCS
          echo "Syncing time-series and club-trends back to GCS..."
          gsutil -m rsync -r "./cache/time-series/" "gs://${GCS_BUCKET}/time-series/"
          gsutil -m rsync -r "./cache/club-trends/" "gs://${GCS_BUCKET}/club-trends/"

          # Time-series: CDN-served overlay (mutable, short cache)
          echo "Uploading time-series with CDN headers..."
          gsutil -m \
            -h "Content-Type:application/json" \
            -h "Cache-Control:public, max-age=3600" \
            cp -rZ ./cache/time-series/* "gs://${GCS_BUCKET}/time-series/"

          echo "- **Dates succeeded**: ${SUCCEEDED}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Dates failed**: ${FAILED}" >> "$GITHUB_STEP_SUMMARY"

          if [ "${FAILED}" -gt 0 ]; then
            echo "::warning::${FAILED} dates failed during rebuild"
          fi

      # ════════════════════════════════════════════════════════
      # RESCRAPE MODE
      # ════════════════════════════════════════════════════════
      # Re-collects CSVs from the Toastmasters dashboard for
      # specified dates (or generates monthly dates from a
      # program year). Then transforms, computes, and uploads.

      # ── Rescrape Step 1: Sync small stores from GCS ──
      - name: '[rescrape] Sync time-series and club-trends from GCS'
        if: steps.mode.outputs.mode == 'rescrape'
        run: |
          mkdir -p ./cache/time-series ./cache/club-trends
          gsutil -m rsync -r "gs://${GCS_BUCKET}/time-series/" "./cache/time-series/" 2>&1 || true
          gsutil -m rsync -r "gs://${GCS_BUCKET}/club-trends/" "./cache/club-trends/" 2>&1 || true
          echo "## ⏬ Store Sync (rescrape)" >> "$GITHUB_STEP_SUMMARY"

      # ── Rescrape Step 2: Scrape → transform → compute → upload ──
      - name: '[rescrape] Re-collect and process dates'
        if: steps.mode.outputs.mode == 'rescrape'
        run: |
          # Determine dates to rescrape
          if [ -n "${{ inputs.dates }}" ]; then
            DATES=$(echo "${{ inputs.dates }}" | tr ',' ' ')
          elif [ -n "${{ inputs.program_year }}" ]; then
            # Generate monthly dates for the program year
            PY="${{ inputs.program_year }}"
            START_YEAR=$(echo "$PY" | cut -d'-' -f1)
            DATES=$(node -e "
              const sy = parseInt('${START_YEAR}', 10);
              const dates = [];
              // Jul through Dec of start year, Jan through Jun of end year
              for (let m = 6; m < 18; m++) {
                const year = sy + Math.floor(m / 12);
                const month = m % 12;
                // Use the 15th of each month as a representative date
                const d = new Date(year, month, 15);
                dates.push(d.toISOString().split('T')[0]);
              }
              process.stdout.write(dates.join(' '));
            ")
            echo "Generated dates from program year ${PY}: ${DATES}"
          else
            echo "::error::rescrape mode requires either 'dates' or 'program_year' input"
            exit 1
          fi

          DATE_COUNT=$(echo "$DATES" | wc -w | tr -d ' ')
          echo "## 🔄 Rescrape" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Dates to rescrape**: ${DATE_COUNT}" >> "$GITHUB_STEP_SUMMARY"
          echo "Rescraping ${DATE_COUNT} dates..."

          # Discover districts (same approach as daily mode)
          if [ -n "${{ inputs.districts }}" ]; then
            DISTRICTS="${{ inputs.districts }}"
            echo "Using manual district override: ${DISTRICTS}"
          else
            # Use the first date to determine program year for district discovery
            FIRST_DATE=$(echo "$DATES" | awk '{print $1}')
            PROGRAM_YEAR=$(node -e "
              const d = new Date('${FIRST_DATE}');
              const y = d.getFullYear(); const m = d.getMonth();
              console.log(m >= 6 ? y+'-'+(y+1) : (y-1)+'-'+y);
            ")
            DATE_FORMATTED=$(date -d "${FIRST_DATE}" +'%-m/%-d/%Y')
            DISTRICTS_CSV_URL="https://dashboards.toastmasters.org/${PROGRAM_YEAR}/export.aspx?type=CSV&report=districtsummary~${DATE_FORMATTED}~~${PROGRAM_YEAR}"

            echo "Discovering districts from: ${DISTRICTS_CSV_URL}"
            DISTRICTS=$(curl -sf --retry 3 --max-time 30 "${DISTRICTS_CSV_URL}" | node -e "
              const data = require('fs').readFileSync('/dev/stdin','utf8');
              const lines = data.trim().split('\n');
              const headers = lines[0].split(',').map(h => h.replace(/\\\"/g,'').trim());
              const col = headers.indexOf('DISTRICT');
              const ids = [...new Set(lines.slice(1)
                .map(l => l.split(',')[col].replace(/\\\"/g,'').trim())
                .filter(id => /^[A-Z0-9]+$/i.test(id)))];
              ids.sort((a,b) => { const na=parseInt(a,10),nb=parseInt(b,10); return isNaN(na)||isNaN(nb)?a.localeCompare(b):na-nb; });
              process.stdout.write(ids.join(','));
            ")

            if [ -z "${DISTRICTS}" ]; then
              echo "::error::Failed to discover districts from Toastmasters CSV."
              exit 1
            fi
            echo "Discovered $(echo "${DISTRICTS}" | tr ',' '\n' | wc -l | tr -d ' ') districts"
          fi
          echo "- **Districts**: $(echo "${DISTRICTS}" | tr ',' '\n' | wc -l | tr -d ' ')" >> "$GITHUB_STEP_SUMMARY"

          SUCCEEDED=0
          FAILED=0
          INDEX=0

          for DATE in ${DATES}; do
            INDEX=$((INDEX + 1))
            echo ""
            echo "═══════════════════════════════════════"
            echo "[${INDEX}/${DATE_COUNT}] Rescraping ${DATE}"
            echo "═══════════════════════════════════════"

            # 1. Snapshot existing dirs before scrape+transform
            BEFORE_DIRS=$(ls -d ./cache/snapshots/????-??-?? 2>/dev/null | sort || true)

            # 2. Scrape from dashboard + transform in one step
            echo "Scraping and transforming ${DATE}..."
            SCRAPE_ARGS="--date ${DATE} --transform --force --verbose --districts ${DISTRICTS}"
            if ! npx collector-cli scrape ${SCRAPE_ARGS} 2>&1; then
              echo "::warning::Scrape/transform failed for ${DATE}"
              FAILED=$((FAILED + 1))
              continue
            fi

            # 3. Detect actual snapshot date (same as rebuild #193)
            AFTER_DIRS=$(ls -d ./cache/snapshots/????-??-?? 2>/dev/null | sort || true)
            ACTUAL_DATE=$(comm -13 <(echo "$BEFORE_DIRS") <(echo "$AFTER_DIRS") \
                          | head -1 | grep -oP '\d{4}-\d{2}-\d{2}' || true)
            ACTUAL_DATE="${ACTUAL_DATE:-$DATE}"
            if [ "$ACTUAL_DATE" != "$DATE" ]; then
              echo "Date remapped: ${DATE} → ${ACTUAL_DATE}"
            fi

            # 4. Compute analytics
            echo "Computing analytics for ${ACTUAL_DATE}..."
            if ! npx collector-cli compute-analytics --date "${ACTUAL_DATE}" --force-analytics --verbose 2>&1; then
              echo "::warning::Compute failed for ${ACTUAL_DATE}"
              FAILED=$((FAILED + 1))
            fi

            # 5. Upload snapshots + analytics to GCS
            SNAPSHOT_DIR="./cache/snapshots/${ACTUAL_DATE}"
            if [ -d "${SNAPSHOT_DIR}" ]; then
              FILE_COUNT=$(find "${SNAPSHOT_DIR}" -name '*.json' 2>/dev/null | wc -l | tr -d ' ')
              echo "Uploading snapshots/${ACTUAL_DATE}/ (${FILE_COUNT} files)..."
              gsutil -m \
                -h "Content-Type:application/json" \
                -h "Cache-Control:public, max-age=3600, must-revalidate" \
                cp -Z \
                "${SNAPSHOT_DIR}"/*.json \
                "gs://${GCS_BUCKET}/snapshots/${ACTUAL_DATE}/"

              if [ -d "${SNAPSHOT_DIR}/analytics" ]; then
                gsutil -m \
                  -h "Content-Type:application/json" \
                  -h "Cache-Control:public, max-age=3600, must-revalidate" \
                  cp -Z \
                  "${SNAPSHOT_DIR}/analytics"/*.json \
                  "gs://${GCS_BUCKET}/snapshots/${ACTUAL_DATE}/analytics/"
              fi
              SUCCEEDED=$((SUCCEEDED + 1))
            else
              echo "::warning::No snapshot directory found for ${DATE} (expected ${ACTUAL_DATE})"
            fi

            # 6. Upload raw-csv to GCS (replace old corrupt data)
            RAW_CSV_DIR="./cache/raw-csv/${DATE}"
            if [ -d "${RAW_CSV_DIR}" ]; then
              echo "Uploading raw-csv/${DATE}/..."
              gsutil -m rsync -r "${RAW_CSV_DIR}/" "gs://${GCS_BUCKET}/raw-csv/${DATE}/"
            fi

            # 7. Cleanup to free disk
            rm -rf "./cache/raw-csv/${DATE}" "./cache/snapshots/${ACTUAL_DATE}"

            if [ $((INDEX % 5)) -eq 0 ]; then
              echo "Disk usage after ${INDEX} dates: $(df -h . | tail -1 | awk '{print $3 " used / " $4 " free"}')"
            fi
          done

          # Sync accumulated stores back to GCS
          echo "Syncing time-series and club-trends back to GCS..."
          gsutil -m rsync -r "./cache/time-series/" "gs://${GCS_BUCKET}/time-series/"
          gsutil -m rsync -r "./cache/club-trends/" "gs://${GCS_BUCKET}/club-trends/"

          # Time-series: CDN-served overlay (mutable, short cache)
          echo "Uploading time-series with CDN headers..."
          gsutil -m \
            -h "Content-Type:application/json" \
            -h "Cache-Control:public, max-age=3600" \
            cp -rZ ./cache/time-series/* "gs://${GCS_BUCKET}/time-series/"

          echo "- **Dates succeeded**: ${SUCCEEDED}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Dates failed**: ${FAILED}" >> "$GITHUB_STEP_SUMMARY"

          if [ "${FAILED}" -gt 0 ]; then
            echo "::warning::${FAILED} dates failed during rescrape"
          fi

      # ════════════════════════════════════════════════════════
      # RESCRAPE-HISTORICAL MODE (#205)
      # One-time: re-download ALL historical CSVs from the dashboard
      # using the 4-segment URL format, then rebuild everything.
      # ════════════════════════════════════════════════════════

      - name: '[rescrape-historical] Download historical CSVs'
        if: steps.mode.outputs.mode == 'rescrape-historical'
        run: |
          echo "## 📥 Historical Rescrape (#205)" >> "$GITHUB_STEP_SUMMARY"

          # Clean slate — remove any old raw-csv data so rebuild has no stale dirs
          echo "Cleaning cache/raw-csv for a fresh start..."
          rm -rf ./cache/raw-csv
          mkdir -p ./cache/raw-csv

          echo "Downloading month-specific CSVs using 4-segment URL format..."

          YEAR_FLAG=""
          if [ -n "${{ inputs.program_year }}" ]; then
            YEAR_FLAG="--year ${{ inputs.program_year }}"
            echo "- **Program year filter**: ${{ inputs.program_year }}" >> "$GITHUB_STEP_SUMMARY"
          fi

          npx tsx scripts/rescrape-historical.ts \
            --execute \
            --cache-dir ./cache \
            --rate 8 \
            ${YEAR_FLAG}

          DATE_COUNT=$(find ./cache/raw-csv -maxdepth 1 -type d -name '????-??-??' | wc -l | tr -d ' ')
          echo "- **Raw-csv dates downloaded**: ${DATE_COUNT}" >> "$GITHUB_STEP_SUMMARY"

      - name: '[rescrape-historical] Rebuild from fresh CSVs'
        if: steps.mode.outputs.mode == 'rescrape-historical'
        run: |
          echo "Rebuilding all derived data from fresh CSVs..."
          npx collector-cli rebuild --verbose

      - name: '[rescrape-historical] Nuke stale GCS data'
        if: steps.mode.outputs.mode == 'rescrape-historical' && inputs.program_year == ''
        run: |
          echo "## 🗑️ GCS Cleanup (pre-upload, full rescrape only)" >> "$GITHUB_STEP_SUMMARY"
          echo "Deleting stale time-series from GCS..."
          gsutil -m rm -r "gs://${GCS_BUCKET}/time-series/" 2>&1 || echo "(no time-series to delete)"
          echo "Deleting stale snapshots from GCS..."
          gsutil -m rm -r "gs://${GCS_BUCKET}/snapshots/" 2>&1 || echo "(no snapshots to delete)"
          echo "Deleting stale club-trends from GCS..."
          gsutil -m rm -r "gs://${GCS_BUCKET}/club-trends/" 2>&1 || echo "(no club-trends to delete)"
          echo "- **Stale GCS data deleted** ✓" >> "$GITHUB_STEP_SUMMARY"

      - name: '[rescrape-historical] Upload rebuilt data to GCS'
        if: steps.mode.outputs.mode == 'rescrape-historical'
        run: |
          echo "## ⬆️ Upload Fresh Data" >> "$GITHUB_STEP_SUMMARY"

          # Upload snapshots with immutable CDN headers
          echo "Uploading snapshots..."
          gsutil -m \
            -h "Content-Type:application/json" \
            -h "Cache-Control:public, max-age=3600, must-revalidate" \
            cp -rZ ./cache/snapshots/* "gs://${GCS_BUCKET}/snapshots/"

          # Upload time-series with short cache
          echo "Uploading time-series..."
          gsutil -m \
            -h "Content-Type:application/json" \
            -h "Cache-Control:public, max-age=3600" \
            cp -rZ ./cache/time-series/* "gs://${GCS_BUCKET}/time-series/"

          # Upload club-trends
          echo "Uploading club-trends..."
          gsutil -m \
            -h "Content-Type:application/json" \
            -h "Cache-Control:public, max-age=3600" \
            cp -rZ ./cache/club-trends/* "gs://${GCS_BUCKET}/club-trends/"

          # Upload raw-csv
          echo "Uploading raw-csv..."
          gsutil -m rsync -r "./cache/raw-csv/" "gs://${GCS_BUCKET}/raw-csv/"

          SNAP_COUNT=$(find ./cache/snapshots -maxdepth 1 -type d -name '????-??-??' | wc -l | tr -d ' ')
          TS_COUNT=$(find ./cache/time-series -name '*.json' 2>/dev/null | wc -l | tr -d ' ')
          echo "- **Snapshots uploaded**: ${SNAP_COUNT}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Time-series files**: ${TS_COUNT}" >> "$GITHUB_STEP_SUMMARY"

      # ════════════════════════════════════════════════════════
      # PRUNE MODE
      # ════════════════════════════════════════════════════════

      # ── Prune Step 1: Sync all data from GCS ──
      - name: '[prune] Sync all data from GCS'
        if: steps.mode.outputs.mode == 'prune'
        run: |
          echo "Syncing all data from GCS for pruning..."
          mkdir -p ./cache/raw-csv ./cache/snapshots
          gsutil -m rsync -r "gs://${GCS_BUCKET}/raw-csv/" "./cache/raw-csv/"
          gsutil -m rsync -r "gs://${GCS_BUCKET}/snapshots/" "./cache/snapshots/"

          echo "## ⏬ Sync for Prune" >> "$GITHUB_STEP_SUMMARY"
          DATE_COUNT=$(find ./cache/raw-csv -maxdepth 1 -type d -name '????-??-??' | wc -l | tr -d ' ')
          echo "- **Raw-csv dates**: ${DATE_COUNT}" >> "$GITHUB_STEP_SUMMARY"

      # ── Prune Step 2: Run collector-cli prune ──
      - name: '[prune] Identify and remove non-month-end dates'
        if: steps.mode.outputs.mode == 'prune'
        id: prune
        run: |
          DRY_RUN_FLAG=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
            echo "::notice::Dry-run mode — no data will be deleted"
          fi

          echo "Running: npx collector-cli prune --verbose ${DRY_RUN_FLAG}"
          npx collector-cli prune --verbose ${DRY_RUN_FLAG} | tee /tmp/prune-output.json

          echo "## 🧹 Prune Results" >> "$GITHUB_STEP_SUMMARY"
          cat /tmp/prune-output.json | jq '.' >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true

      # ── Prune Step 3: Delete pruned dates from GCS ──
      - name: '[prune] Delete pruned dates from GCS'
        if: steps.mode.outputs.mode == 'prune' && inputs.dry_run != 'true'
        run: |
          echo "Deleting pruned dates from GCS..."

          # Find dates that were in GCS but no longer exist locally (pruned)
          # List local snapshot dates
          LOCAL_DATES=$(find ./cache/snapshots -maxdepth 1 -type d -name '????-??-??' -exec basename {} \; | sort)
          # List GCS snapshot dates
          GCS_DATES=$(gsutil ls "gs://${GCS_BUCKET}/snapshots/" | grep -oP '\d{4}-\d{2}-\d{2}' | sort -u)

          DELETED=0
          for GCS_DATE in ${GCS_DATES}; do
            if ! echo "${LOCAL_DATES}" | grep -q "^${GCS_DATE}$"; then
              echo "Deleting gs://${GCS_BUCKET}/snapshots/${GCS_DATE}/..."
              gsutil -m rm -r "gs://${GCS_BUCKET}/snapshots/${GCS_DATE}/" || true
              echo "Deleting gs://${GCS_BUCKET}/raw-csv/${GCS_DATE}/..."
              gsutil -m rm -r "gs://${GCS_BUCKET}/raw-csv/${GCS_DATE}/" || true
              DELETED=$((DELETED + 1))
            fi
          done

          echo "## 🗑️ GCS Cleanup" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Dates deleted from GCS**: ${DELETED}" >> "$GITHUB_STEP_SUMMARY"

      # ════════════════════════════════════════════════════════
      # SHARED: CDN Manifests (daily + rebuild)
      # ════════════════════════════════════════════════════════

      - name: Generate CDN manifests
        if: steps.mode.outputs.mode != 'prune' || inputs.dry_run != 'true'
        run: |
          # Determine the latest date from local snapshots (falls back to GCS
          # listing when local cache is empty, e.g. after a rebuild that deletes
          # each snapshot post-upload to conserve disk).
          # Only consider snapshot dirs that contain actual JSON files (#295).
          # Orphan empty dirs (from previous-year YoY fetches) must not
          # be picked up as the latest date.
          LATEST_DATE=$(find ./cache/snapshots -maxdepth 1 -type d -name '????-??-??' \
            -exec sh -c 'ls "$1"/*.json >/dev/null 2>&1 && basename "$1"' _ {} \; \
            | sort | tail -1)
          if [ -z "${LATEST_DATE}" ]; then
            echo "Local snapshot cache empty — checking GCS for latest date..."
            LATEST_DATE=$(gsutil ls "gs://${GCS_BUCKET}/snapshots/" \
              | grep -oP '\d{4}-\d{2}-\d{2}' | sort -u | tail -1)
          fi
          if [ -z "${LATEST_DATE}" ]; then
            echo "::warning::No snapshot dates found locally or in GCS, skipping manifests"
            exit 0
          fi
          echo "Latest snapshot date: ${LATEST_DATE}"

          # v1/latest.json (short TTL, 5 min)
          node -e "
            const fs = require('fs');
            const manifest = {
              _format: { version: '1.0.0', type: 'manifest' },
              latestSnapshotDate: '${LATEST_DATE}',
              generatedAt: new Date().toISOString()
            };
            fs.writeFileSync('/tmp/latest.json', JSON.stringify(manifest, null, 2));
            console.log('Generated v1/latest.json for ${LATEST_DATE}');
          "
          gsutil \
            -h "Content-Type:application/json" \
            -h "Cache-Control:public, max-age=300" \
            cp /tmp/latest.json "gs://${GCS_BUCKET}/v1/latest.json"

          # v1/dates.json (medium TTL, 15 min)
          gsutil ls "gs://${GCS_BUCKET}/snapshots/" | \
            grep -oP '\d{4}-\d{2}-\d{2}' | sort -u > /tmp/all-dates.txt
          node -e "
            const fs = require('fs');
            const dates = fs.readFileSync('/tmp/all-dates.txt', 'utf-8')
              .trim().split('\n').filter(Boolean);
            const data = {
              _format: { version: '1.0.0', type: 'dates-index' },
              dates, count: dates.length,
              generatedAt: new Date().toISOString()
            };
            fs.writeFileSync('/tmp/dates.json', JSON.stringify(data, null, 2));
            console.log('Generated v1/dates.json with ' + dates.length + ' dates');
          "
          gsutil \
            -h "Content-Type:application/json" \
            -h "Cache-Control:public, max-age=900" \
            cp /tmp/dates.json "gs://${GCS_BUCKET}/v1/dates.json"

          # v1/rankings.json (short TTL, 5 min)
          # In rebuild mode, local snapshots are cleaned per-date — fetch from GCS
          RANKINGS_SRC="./cache/snapshots/${LATEST_DATE}/all-districts-rankings.json"
          if [ ! -f "${RANKINGS_SRC}" ]; then
            mkdir -p "./cache/snapshots/${LATEST_DATE}"
            gsutil cp "gs://${GCS_BUCKET}/snapshots/${LATEST_DATE}/all-districts-rankings.json" \
              "${RANKINGS_SRC}" 2>/dev/null || true
          fi
          if [ -f "${RANKINGS_SRC}" ]; then
            node -e "
              const fs = require('fs');
              const src = JSON.parse(fs.readFileSync('${RANKINGS_SRC}', 'utf-8'));
              const data = {
                _format: { version: '1.0.0', type: 'rankings' },
                rankings: src.rankings,
                date: src.metadata.sourceCsvDate || '${LATEST_DATE}',
                generatedAt: new Date().toISOString()
              };
              fs.writeFileSync('/tmp/rankings.json', JSON.stringify(data, null, 2));
              console.log('Generated v1/rankings.json with ' + src.rankings.length + ' districts');
            "
            gsutil \
              -h "Content-Type:application/json" \
              -h "Cache-Control:public, max-age=300" \
              cp /tmp/rankings.json "gs://${GCS_BUCKET}/v1/rankings.json"
          else
            echo "::warning::all-districts-rankings.json not found, skipping v1/rankings.json"
          fi

          # v1/rank-history/{districtId}.json
          # Issue #186: Download rankings into date-prefixed filenames
          # to avoid overwriting (all files are named all-districts-rankings.json)
          echo "Building per-district rank history..."
          mkdir -p /tmp/rank-history-src /tmp/rank-history-out
          gsutil ls "gs://${GCS_BUCKET}/snapshots/*/all-districts-rankings.json" \
            2>/dev/null | while IFS= read -r gcs_path; do
            DATE_DIR=$(echo "${gcs_path}" | grep -oP '\d{4}-\d{2}-\d{2}')
            if [ -n "${DATE_DIR}" ]; then
              gsutil -q cp "${gcs_path}" \
                "/tmp/rank-history-src/${DATE_DIR}.json" 2>/dev/null || true
            fi
          done

          RANK_FILE_COUNT=$(ls /tmp/rank-history-src/*.json 2>/dev/null | wc -l | tr -d ' ')
          echo "Downloaded ${RANK_FILE_COUNT} historical rankings files"

          if [ "${RANK_FILE_COUNT}" -gt "0" ]; then
            node -e "
              const fs = require('fs');
              const path = require('path');
              const srcDir = '/tmp/rank-history-src';
              const outDir = '/tmp/rank-history-out';
              const index = new Map();
              const files = fs.readdirSync(srcDir).filter(f => f.endsWith('.json'));
              for (const file of files) {
                try {
                  const data = JSON.parse(fs.readFileSync(path.join(srcDir, file), 'utf-8'));
                  // Use the snapshot date (filename) not sourceCsvDate (raw-csv date) (#302)
                  const date = path.basename(file, '.json');
                  if (!date || !data.rankings) continue;
                  for (const r of data.rankings) {
                    if (!index.has(r.districtId)) {
                      index.set(r.districtId, { districtId: r.districtId, districtName: r.districtName, history: [] });
                    }
                    const entry = index.get(r.districtId);
                    if (entry.districtName === 'District ' + r.districtId) entry.districtName = r.districtName;
                    entry.history.push({
                      date, aggregateScore: r.aggregateScore,
                      clubsRank: r.clubsRank, paymentsRank: r.paymentsRank,
                      distinguishedRank: r.distinguishedRank,
                      totalDistricts: data.metadata.totalDistricts,
                      overallRank: r.overallRank ?? 0
                    });
                  }
                } catch (e) { console.error('Skipping ' + file + ': ' + e.message); }
              }
              let totalPoints = 0;
              for (const [id, entry] of index) {
                entry.history.sort((a, b) => a.date.localeCompare(b.date));
                const seen = new Set();
                entry.history = entry.history.filter(p => { if (seen.has(p.date)) return false; seen.add(p.date); return true; });
                totalPoints += entry.history.length;
                fs.writeFileSync(path.join(outDir, id + '.json'), JSON.stringify(entry));
              }
              console.log('Generated rank history for ' + index.size + ' districts (' + totalPoints + ' total points)');
            "
            gsutil -m \
              -h "Content-Type:application/json" \
              -h "Cache-Control:public, max-age=300" \
              cp -r "/tmp/rank-history-out/*.json" \
              "gs://${GCS_BUCKET}/v1/rank-history/"
          fi

          echo "## 📋 CDN Manifests" >> "$GITHUB_STEP_SUMMARY"
          echo "- **v1/latest.json**: ${LATEST_DATE}" >> "$GITHUB_STEP_SUMMARY"
          DATE_COUNT=$(wc -l < /tmp/all-dates.txt | tr -d ' ')
          echo "- **v1/dates.json**: ${DATE_COUNT} dates" >> "$GITHUB_STEP_SUMMARY"

      # ── Shared: Update district-snapshot-index ──
      - name: Update district-snapshot-index
        if: steps.mode.outputs.mode != 'prune' || inputs.dry_run != 'true'
        run: |
          MODE="${{ steps.mode.outputs.mode }}"
          INDEX_PATH="gs://${GCS_BUCKET}/config/district-snapshot-index.json"

          if [ "${MODE}" = "rebuild" ]; then
            # Rebuild: generate from GCS listing (local snapshots are cleaned per-date)
            echo "Generating snapshot index from GCS..."
            gsutil ls "gs://${GCS_BUCKET}/snapshots/*/district_*.json" > /tmp/snapshot-files.txt 2>/dev/null || true
            node -e "
              const fs = require('fs');
              const lines = fs.readFileSync('/tmp/snapshot-files.txt', 'utf-8').trim().split('\n').filter(Boolean);
              const index = {};
              // Parse GCS paths: gs://bucket/snapshots/YYYY-MM-DD/district_XX.json
              for (const line of lines) {
                const match = line.match(/snapshots\/(\d{4}-\d{2}-\d{2})\/district_(\w+)\.json$/);
                if (match && match[1] && match[2] && /^[A-Z0-9]+$/i.test(match[2])) {
                  const [, date, id] = match;
                  if (!index[id]) index[id] = [];
                  if (!index[id].includes(date)) index[id].push(date);
                }
              }
              for (const id of Object.keys(index)) index[id].sort();
              const dates = [...new Set(lines.map(l => l.match(/snapshots\/(\d{4}-\d{2}-\d{2})\//)?.[1]).filter(Boolean))];
              const out = { generatedAt: new Date().toISOString(), districts: index };
              fs.writeFileSync('/tmp/district-snapshot-index.json', JSON.stringify(out, null, 2));
              console.log('Generated snapshot index: ' + Object.keys(index).length + ' districts, ' + dates.length + ' dates');
            "
          else
            # Daily: merge today's snapshot date into existing index
            # Use snapshot_date (post closing-period remap) not raw date (#309)
            DATE="${{ steps.daily-scrape.outputs.snapshot_date || steps.daily-scrape.outputs.date || steps.daily-config.outputs.date }}"
            DISTRICT_LIST="${{ steps.daily-config.outputs.districts }}"

            gsutil cp "${INDEX_PATH}" /tmp/district-snapshot-index.json 2>/dev/null || \
              echo '{"generatedAt":"","districts":{}}' > /tmp/district-snapshot-index.json

            node -e "
              const fs = require('fs');
              const raw = JSON.parse(fs.readFileSync('/tmp/district-snapshot-index.json', 'utf-8'));
              // Normalize: old flat format → new nested format
              const districts = (raw.districts && typeof raw.districts === 'object' && !Array.isArray(raw.districts))
                ? raw.districts : raw;
              const date = '${DATE}';
              for (const id of '${DISTRICT_LIST}'.split(',').map(d => d.trim())) {
                const dateSet = new Set(districts[id] || []);
                dateSet.add(date);
                districts[id] = [...dateSet].sort();
              }
              // Always write new nested format
              const out = { generatedAt: new Date().toISOString(), districts };
              fs.writeFileSync('/tmp/district-snapshot-index.json', JSON.stringify(out, null, 2));
              console.log('Updated index for ' + Object.keys(districts).length + ' districts with date ' + date);
            "
          fi

          gsutil \
            -h "Content-Type:application/json" \
            -h "Cache-Control:public, max-age=300" \
            cp /tmp/district-snapshot-index.json "${INDEX_PATH}"

          echo "## 📋 District Snapshot Index" >> "$GITHUB_STEP_SUMMARY"
          DISTRICT_COUNT=$(jq '.districts | keys | length' /tmp/district-snapshot-index.json)
          echo "- **Districts in index**: ${DISTRICT_COUNT}" >> "$GITHUB_STEP_SUMMARY"

      # ════════════════════════════════════════════════════════
      # STAGING → PRODUCTION PROMOTION (#316)
      # ════════════════════════════════════════════════════════

      - name: Diff staging vs production
        id: diff
        if: steps.mode.outputs.mode != 'prune'
        run: |
          echo "Comparing staging vs production buckets..."

          # Count files in each bucket's key directories
          STAGING_SNAPSHOTS=$(gsutil ls "gs://${GCS_BUCKET}/snapshots/" 2>/dev/null | grep -c '/$' || echo 0)
          PROD_SNAPSHOTS=$(gsutil ls "gs://${GCS_BUCKET_PRODUCTION}/snapshots/" 2>/dev/null | grep -c '/$' || echo 0)

          STAGING_LATEST=$(gsutil cat "gs://${GCS_BUCKET}/v1/latest.json" 2>/dev/null | jq -r '.latestSnapshotDate' || echo "unknown")
          PROD_LATEST=$(gsutil cat "gs://${GCS_BUCKET_PRODUCTION}/v1/latest.json" 2>/dev/null | jq -r '.latestSnapshotDate' || echo "unknown")

          STAGING_DATES=$(gsutil cat "gs://${GCS_BUCKET}/v1/dates.json" 2>/dev/null | jq '.count' || echo 0)
          PROD_DATES=$(gsutil cat "gs://${GCS_BUCKET_PRODUCTION}/v1/dates.json" 2>/dev/null | jq '.count' || echo 0)

          STAGING_RANKINGS=$(gsutil cat "gs://${GCS_BUCKET}/v1/rankings.json" 2>/dev/null | jq '.rankings | length' || echo 0)
          PROD_RANKINGS=$(gsutil cat "gs://${GCS_BUCKET_PRODUCTION}/v1/rankings.json" 2>/dev/null | jq '.rankings | length' || echo 0)

          echo "## 🔍 Staging vs Production Diff" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Staging | Production | Delta |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|---------|------------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Latest date | ${STAGING_LATEST} | ${PROD_LATEST} | $([ "$STAGING_LATEST" = "$PROD_LATEST" ] && echo '✓ same' || echo '⚠ changed') |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Snapshot dirs | ${STAGING_SNAPSHOTS} | ${PROD_SNAPSHOTS} | $((STAGING_SNAPSHOTS - PROD_SNAPSHOTS)) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Dates in index | ${STAGING_DATES} | ${PROD_DATES} | $((STAGING_DATES - PROD_DATES)) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Districts ranked | ${STAGING_RANKINGS} | ${PROD_RANKINGS} | $((STAGING_RANKINGS - PROD_RANKINGS)) |" >> "$GITHUB_STEP_SUMMARY"

          # Determine if promotion is safe (additive-only)
          PROMOTE="true"
          if [ "$STAGING_RANKINGS" -lt "$PROD_RANKINGS" ] 2>/dev/null; then
            echo "::warning::SUBTRACTIVE: staging has fewer ranked districts than production"
            PROMOTE="false"
          fi
          if [ "$STAGING_DATES" -lt "$PROD_DATES" ] 2>/dev/null; then
            echo "::warning::SUBTRACTIVE: staging has fewer dates than production"
            PROMOTE="false"
          fi

          echo "promote=${PROMOTE}" >> "$GITHUB_OUTPUT"
          echo "- **Promotion**: $([ "$PROMOTE" = "true" ] && echo '✅ Safe (additive)' || echo '❌ Blocked (subtractive change detected)')" >> "$GITHUB_STEP_SUMMARY"

      - name: Promote staging to production
        if: steps.diff.outputs.promote == 'true' && steps.mode.outputs.mode != 'prune'
        run: |
          echo "Promoting staging → production..."

          # Sync manifests (v1/)
          gsutil -m rsync -r "gs://${GCS_BUCKET}/v1/" "gs://${GCS_BUCKET_PRODUCTION}/v1/"

          # Sync snapshots (only new/changed)
          gsutil -m rsync -r "gs://${GCS_BUCKET}/snapshots/" "gs://${GCS_BUCKET_PRODUCTION}/snapshots/"

          # Sync time-series
          gsutil -m rsync -r "gs://${GCS_BUCKET}/time-series/" "gs://${GCS_BUCKET_PRODUCTION}/time-series/"

          # Sync club-trends
          gsutil -m rsync -r "gs://${GCS_BUCKET}/club-trends/" "gs://${GCS_BUCKET_PRODUCTION}/club-trends/"

          # Sync config (snapshot index)
          gsutil -m rsync -r "gs://${GCS_BUCKET}/config/" "gs://${GCS_BUCKET_PRODUCTION}/config/"

          echo "## ✅ Promotion Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "Staging data synced to production bucket." >> "$GITHUB_STEP_SUMMARY"

      - name: Promotion blocked
        if: steps.diff.outputs.promote == 'false' && steps.mode.outputs.mode != 'prune'
        run: |
          echo "::error::Promotion BLOCKED — subtractive changes detected in staging. Production data unchanged."
          echo "## ❌ Promotion Blocked" >> "$GITHUB_STEP_SUMMARY"
          echo "Subtractive changes detected. Production data is **unchanged**." >> "$GITHUB_STEP_SUMMARY"
          echo "Review the diff above and manually promote if safe." >> "$GITHUB_STEP_SUMMARY"

      # ── Summary ──
      - name: Pipeline summary
        if: always()
        run: |
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "---" >> "$GITHUB_STEP_SUMMARY"
          MODE="${{ steps.mode.outputs.mode }}"
          TIMESTAMP=$(date -u +%H:%M' UTC')
          echo "🏁 **${MODE}** pipeline completed at ${TIMESTAMP}" >> "$GITHUB_STEP_SUMMARY"
