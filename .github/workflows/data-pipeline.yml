# Data Pipeline Workflow
# Runs daily: scrape → transform → compute-analytics → upload to GCS
#
# Prerequisites:
#   1. Run scripts/setup-wif.sh (one-time)
#   2. Add GitHub secrets: GCP_PROJECT_ID, GCP_WORKLOAD_IDENTITY_PROVIDER, GCP_SERVICE_ACCOUNT
#
# The collector uses Playwright (chromium) to scrape Toastmasters dashboards.
# Data is processed locally and uploaded to GCS for the backend to consume.

name: Data Pipeline

on:
  schedule:
    # Run daily at 13:00 UTC (8 AM EST / 9 AM EDT)
    - cron: '0 13 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Target date (YYYY-MM-DD), defaults to today'
        required: false
        type: string
      districts:
        description: 'Comma-separated district IDs (e.g. 57,58,59), defaults to all'
        required: false
        type: string
      force:
        description: 'Force re-scrape even if cache exists'
        required: false
        type: boolean
        default: false

# Prevent overlapping pipeline runs
concurrency:
  group: data-pipeline
  cancel-in-progress: false

env:
  NODE_VERSION: '20'

permissions:
  contents: read
  id-token: write # Required for Workload Identity Federation

jobs:
  data-pipeline:
    name: Scrape, Transform, Analyze & Upload
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: |
          npm run build --workspace=@toastmasters/shared-contracts
          npm run build --workspace=@toastmasters/analytics-core
          npm run build --workspace=@toastmasters/collector-cli

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      # ── Step 1: Discover districts + sync raw-csv cache from GCS ────────
      # Districts are auto-discovered by downloading the Toastmasters
      # districtsummary CSV for the target date and parsing the DISTRICT column.
      # Manual workflow_dispatch 'districts' input overrides auto-discovery.
      # Previously used config/districts.json from GCS (now deprecated, kept in
      # place but no longer read). Companion to backend change #139.
      - name: Discover districts and sync raw-csv from GCS
        id: config
        env:
          GCS_BUCKET: 'toast-stats-data-ca'
        run: |
          # Toastmasters dashboard is always one day behind — use yesterday
          TARGET_DATE="${{ inputs.date || '' }}"
          if [ -z "${TARGET_DATE}" ]; then
            TARGET_DATE=$(date -u -d '1 day ago' +%Y-%m-%d)
          fi
          echo "Target date: ${TARGET_DATE}"

          # If districts were manually specified via workflow_dispatch, use them directly
          if [ -n "${{ inputs.districts }}" ]; then
            DISTRICTS="${{ inputs.districts }}"
            echo "Using manual district override: ${DISTRICTS}"
          else
            # Auto-discover districts from the Toastmasters districtsummary CSV
            PROGRAM_YEAR=$(node -e "
              const d = new Date('${TARGET_DATE}');
              const y = d.getFullYear(); const m = d.getMonth();
              console.log(m >= 6 ? y+'-'+(y+1) : (y-1)+'-'+y);
            ")
            DATE_FORMATTED=$(date -d "${TARGET_DATE}" +'%-m/%-d/%Y')
            DISTRICTS_CSV_URL="https://dashboards.toastmasters.org/${PROGRAM_YEAR}/export.aspx?type=CSV&report=districtsummary~${DATE_FORMATTED}~~${PROGRAM_YEAR}"

            echo "Discovering districts from: ${DISTRICTS_CSV_URL}"
            DISTRICTS=$(curl -sf --retry 3 --max-time 30 "${DISTRICTS_CSV_URL}" | node -e "
              const data = require('fs').readFileSync('/dev/stdin','utf8');
              const lines = data.trim().split('\n');
              const headers = lines[0].split(',').map(h => h.replace(/\"/g,'').trim());
              const col = headers.indexOf('DISTRICT');
              // Filter to valid district IDs only: alphanumeric with no spaces or slashes.
              // Accepts: '01', '61', '130', 'F', 'U' (valid single-letter districts)
              // Rejects: 'As of 02/26/2026' and other CSV footer/metadata rows (#145)
              const ids = [...new Set(lines.slice(1)
                .map(l => l.split(',')[col].replace(/\"/g,'').trim())
                .filter(id => /^[A-Z0-9]+$/i.test(id)))];
              ids.sort((a,b) => { const na=parseInt(a,10),nb=parseInt(b,10); return isNaN(na)||isNaN(nb)?a.localeCompare(b):na-nb; });
              process.stdout.write(ids.join(','));
            ")

            if [ -z "${DISTRICTS}" ]; then
              echo "::error::Failed to discover districts from Toastmasters CSV. The dashboard may be down or the CSV format changed."
              exit 1
            fi
            echo "Discovered $(echo "${DISTRICTS}" | tr ',' '\n' | wc -l | tr -d ' ') districts"
          fi

          echo "districts=${DISTRICTS}" >> "$GITHUB_OUTPUT"
          echo "date=${TARGET_DATE}" >> "$GITHUB_OUTPUT"

          # Sync raw-csv cache for target date
          mkdir -p "./cache/raw-csv/${TARGET_DATE}"
          gsutil -m rsync -r \
            "gs://${GCS_BUCKET}/raw-csv/${TARGET_DATE}/" \
            "./cache/raw-csv/${TARGET_DATE}/" \
            2>&1 || echo "No existing raw-csv for ${TARGET_DATE} in GCS (first run for this date)"

          echo "## ⏬ District Discovery & Raw CSV Sync" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Districts**: ${DISTRICTS}" >> "$GITHUB_STEP_SUMMARY"
          FILE_COUNT=$(find "./cache/raw-csv/${TARGET_DATE}" -name '*.csv' 2>/dev/null | wc -l | tr -d ' ')
          echo "- **Date**: ${TARGET_DATE}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **CSV files restored**: ${FILE_COUNT}" >> "$GITHUB_STEP_SUMMARY"


      # ── Step 2: Scrape + Transform ──────────────────────────
      - name: Scrape & Transform
        id: scrape
        env:
          TOASTMASTERS_DASHBOARD_URL: 'https://dashboards.toastmasters.org'
        run: |
          ARGS="--transform --verbose"

          # Use manual date if provided, otherwise default to yesterday
          # (Toastmasters dashboard is always one day behind)
          if [ -n "${{ inputs.date }}" ]; then
            ARGS="$ARGS --date ${{ inputs.date }}"
          else
            ARGS="$ARGS --date $(date -u -d '1 day ago' +%Y-%m-%d)"
          fi

          # District list comes from Step 1: auto-discovered from Toastmasters CSV
          # or overridden by the manual workflow_dispatch input
          DISTRICT_LIST="${{ steps.config.outputs.districts }}"
          ARGS="$ARGS --districts ${DISTRICT_LIST}"


          # Force flag
          if [ "${{ inputs.force }}" = "true" ]; then
            ARGS="$ARGS --force"
          fi

          echo "Running: npx collector-cli scrape $ARGS"
          npx collector-cli scrape $ARGS | tee /tmp/scrape-output.json

          # Extract date from output for subsequent steps
          DATE=$(jq -r '.date' /tmp/scrape-output.json)
          echo "date=${DATE}" >> "$GITHUB_OUTPUT"

          echo "## 📥 Scrape Results" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Date**: ${DATE}" >> "$GITHUB_STEP_SUMMARY"
          SUCCEEDED=$(jq '.districts.succeeded' /tmp/scrape-output.json)
          FAILED=$(jq '.districts.failed' /tmp/scrape-output.json)
          echo "- **Districts succeeded**: ${SUCCEEDED}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Districts failed**: ${FAILED}" >> "$GITHUB_STEP_SUMMARY"

      # ── Step 3: Sync time-series from GCS ─────────────────────
      # The TimeSeriesIndexWriter appends today's data point to the
      # existing program-year index. Without prior data, it would
      # create a fresh index with only 1 data point each run.
      # This syncs ~344 KB of index files — not the full 7+ GB cache.
      - name: Sync time-series from GCS
        env:
          GCS_BUCKET: 'toast-stats-data-ca'
        run: |
          echo "Syncing time-series index from GCS..."
          mkdir -p ./cache/time-series
          gsutil -m rsync -r \
            "gs://${GCS_BUCKET}/time-series/" \
            "./cache/time-series/" \
            2>&1 || echo "No existing time-series data in GCS (first run)"

          echo "## ⏬ Time-Series Sync" >> "$GITHUB_STEP_SUMMARY"
          FILE_COUNT=$(find ./cache/time-series -name '*.json' 2>/dev/null | wc -l | tr -d ' ')
          echo "- **Index files restored**: ${FILE_COUNT}" >> "$GITHUB_STEP_SUMMARY"

      # ── Step 3b: Sync previous year snapshots for YoY ──────────
      # The AnalyticsComputer needs the previous program year's
      # snapshot to compute year-over-year comparisons. Without it,
      # the YoY file is written with dataAvailable: false.
      # Syncs all district_*.json files in parallel using gsutil -m cp (#142)
      - name: Sync previous year snapshots from GCS
        env:
          GCS_BUCKET: 'toast-stats-data-ca'
        run: |
          DATE="${{ steps.scrape.outputs.date }}"

          # Calculate previous year date (GNU date on Ubuntu runners)
          PREV_YEAR=$(date -d "${DATE} - 1 year" +%Y-%m-%d)

          echo "Syncing previous year snapshots for YoY comparison (${PREV_YEAR})..."

          # Parallel batch copy — replaces sequential per-district loop (#142)
          mkdir -p "./cache/snapshots/${PREV_YEAR}"
          gsutil -m cp \
            "gs://${GCS_BUCKET}/snapshots/${PREV_YEAR}/district_*.json" \
            "./cache/snapshots/${PREV_YEAR}/" \
            2>/dev/null || true
          SYNCED=$(find "./cache/snapshots/${PREV_YEAR}" -name 'district_*.json' 2>/dev/null | wc -l | tr -d ' ')

          echo "## ⏬ Previous Year Snapshot Sync" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Previous year date**: ${PREV_YEAR}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Snapshots synced**: ${SYNCED}" >> "$GITHUB_STEP_SUMMARY"

      # ── Step 3c: Sync club-trends store from GCS ─────────────────────
      # The ClubTrendsStore accumulates per-club membership and DCP trend
      # data across pipeline runs (#144). Without this sync, each run would
      # start fresh with only today's data point.
      - name: Sync club-trends store from GCS
        env:
          GCS_BUCKET: 'toast-stats-data-ca'
        run: |
          echo "Syncing club-trends store from GCS..."
          mkdir -p ./cache/club-trends
          gsutil -m rsync -r \
            "gs://${GCS_BUCKET}/club-trends/" \
            "./cache/club-trends/" \
            2>&1 || echo "No existing club-trends in GCS (first run)"

          echo "## ⏬ Club-Trends Sync" >> "$GITHUB_STEP_SUMMARY"
          CT_COUNT=$(find ./cache/club-trends -name '*.json' 2>/dev/null | wc -l | tr -d ' ')
          echo "- **Store files restored**: ${CT_COUNT}" >> "$GITHUB_STEP_SUMMARY"

      # ── Step 4: Compute Analytics ───────────────────────────
      - name: Compute Analytics
        run: |
          # Prefer date from scrape output; fall back to config step date (#145)
          DATE="${{ steps.scrape.outputs.date }}"
          if [ -z "${DATE}" ]; then
            DATE="${{ steps.config.outputs.date }}"
            echo "::warning::Scrape step did not output a date; using config step date: ${DATE}"
          fi
          DISTRICT_LIST="${{ steps.config.outputs.districts }}"
          ARGS="--date ${DATE} --districts ${DISTRICT_LIST} --verbose"

          echo "Running: npx collector-cli compute-analytics $ARGS"
          npx collector-cli compute-analytics $ARGS | tee /tmp/analytics-output.json

          echo "## 📊 Analytics Results" >> "$GITHUB_STEP_SUMMARY"
          SUCCEEDED=$(jq '.districts.succeeded' /tmp/analytics-output.json)
          echo "- **Districts computed**: ${SUCCEEDED}" >> "$GITHUB_STEP_SUMMARY"

      # ── Step 5: Sync cache to GCS ───────────────────────────
      # Snapshots/analytics use cp with CDN-optimized metadata:
      #   -Z: auto-gzip + Content-Encoding: gzip (~80% smaller transfers)
      #   -h: Content-Type and Cache-Control for CDN caching
      # Internal state (raw-csv, time-series, club-trends) uses rsync.
      - name: Sync cache to GCS
        env:
          GCS_BUCKET: 'toast-stats-data-ca'
        run: |
          DATE="${{ steps.scrape.outputs.date }}"
          echo "Syncing cache to GCS..."

          # ── Internal state: rsync (no CDN metadata needed) ──

          # Sync raw-csv (only today's date)
          gsutil -m rsync -r \
            "./cache/raw-csv/${DATE}/" \
            "gs://${GCS_BUCKET}/raw-csv/${DATE}/"

          # Sync time-series (all — small, ~344 KB)
          gsutil -m rsync -r \
            "./cache/time-series/" \
            "gs://${GCS_BUCKET}/time-series/"

          # Sync club-trends store (all program years — small, ~50 KB/district)
          gsutil -m rsync -r \
            "./cache/club-trends/" \
            "gs://${GCS_BUCKET}/club-trends/"

          # ── CDN-served files: cp with metadata ──

          # Snapshots + analytics (immutable — data never changes for a given date)
          # -Z: auto-gzip transport encoding (~80% smaller)
          # Cache-Control: immutable, 1 year max-age (CDN + browser never revalidate)
          gsutil -m \
            -h "Content-Type:application/json" \
            -h "Cache-Control:public, max-age=31536000, immutable" \
            cp -Z -r \
            "./cache/snapshots/${DATE}/" \
            "gs://${GCS_BUCKET}/snapshots/${DATE}/"

          echo "## ☁️ GCS Sync Results" >> "$GITHUB_STEP_SUMMARY"
          CSV_COUNT=$(find "./cache/raw-csv/${DATE}" -name '*.csv' 2>/dev/null | wc -l | tr -d ' ')
          SNAPSHOT_COUNT=$(find "./cache/snapshots/${DATE}" -name '*.json' 2>/dev/null | wc -l | tr -d ' ')
          TS_COUNT=$(find ./cache/time-series -name '*.json' 2>/dev/null | wc -l | tr -d ' ')
          echo "- **Date**: ${DATE}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Raw CSVs synced**: ${CSV_COUNT}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Snapshot/analytics files synced**: ${SNAPSHOT_COUNT} (gzip + immutable cache)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Time-series index files synced**: ${TS_COUNT}" >> "$GITHUB_STEP_SUMMARY"

      # ── Step 5b: Generate and upload CDN manifest files ────
      # These files let the frontend discover data via CDN without the Express API.
      - name: Generate CDN manifests
        env:
          GCS_BUCKET: 'toast-stats-data-ca'
        run: |
          DATE="${{ steps.scrape.outputs.date }}"
          DISTRICT_LIST="${{ steps.config.outputs.districts }}"

          # v1/latest.json — current snapshot date (short TTL, 5 min)
          node -e "
            const fs = require('fs');
            const manifest = {
              _format: { version: '1.0.0', type: 'manifest' },
              latestSnapshotDate: '${DATE}',
              generatedAt: new Date().toISOString()
            };
            fs.writeFileSync('/tmp/latest.json', JSON.stringify(manifest, null, 2));
            console.log('Generated v1/latest.json for ' + '${DATE}');
          "
          gsutil \
            -h "Content-Type:application/json" \
            -h "Cache-Control:public, max-age=300" \
            cp /tmp/latest.json "gs://${GCS_BUCKET}/v1/latest.json"

          # v1/dates.json — all available snapshot dates (medium TTL, 15 min)
          # Built from the district-snapshot-index or by listing GCS prefixes
          gsutil ls "gs://${GCS_BUCKET}/snapshots/" | \
            grep -oP '\d{4}-\d{2}-\d{2}' | sort -u > /tmp/all-dates.txt
          node -e "
            const fs = require('fs');
            const dates = fs.readFileSync('/tmp/all-dates.txt', 'utf-8')
              .trim().split('\n').filter(Boolean);
            const data = {
              _format: { version: '1.0.0', type: 'dates-index' },
              dates: dates,
              count: dates.length,
              generatedAt: new Date().toISOString()
            };
            fs.writeFileSync('/tmp/dates.json', JSON.stringify(data, null, 2));
            console.log('Generated v1/dates.json with ' + dates.length + ' dates');
          "
          gsutil \
            -h "Content-Type:application/json" \
            -h "Cache-Control:public, max-age=900" \
            cp /tmp/dates.json "gs://${GCS_BUCKET}/v1/dates.json"

          # v1/rankings.json — district rankings for landing page (short TTL, 5 min) (#173)
          # Reads from all-districts-rankings.json which is already computed by the pipeline
          RANKINGS_SRC="./cache/snapshots/${DATE}/all-districts-rankings.json"
          if [ -f "${RANKINGS_SRC}" ]; then
            node -e "
              const fs = require('fs');
              const src = JSON.parse(fs.readFileSync('${RANKINGS_SRC}', 'utf-8'));
              const data = {
                _format: { version: '1.0.0', type: 'rankings' },
                rankings: src.rankings,
                date: src.metadata.sourceCsvDate || '${DATE}',
                generatedAt: new Date().toISOString()
              };
              fs.writeFileSync('/tmp/rankings.json', JSON.stringify(data, null, 2));
              console.log('Generated v1/rankings.json with ' + src.rankings.length + ' districts');
            "
            gsutil \
              -h "Content-Type:application/json" \
              -h "Cache-Control:public, max-age=300" \
              cp /tmp/rankings.json "gs://${GCS_BUCKET}/v1/rankings.json"
          else
            echo "::warning::all-districts-rankings.json not found at ${RANKINGS_SRC}, skipping v1/rankings.json"
          fi

          # v1/rank-history/{districtId}.json — per-district rank history (#173)
          # Downloads all historical all-districts-rankings.json from GCS,
          # builds per-district history, writes one JSON per district.
          # Replaces the runtime RankHistoryIndex from the Express backend.
          echo "Building per-district rank history..."
          mkdir -p /tmp/rank-history-src /tmp/rank-history-out

          # Download all rankings files from all snapshot dates
          gsutil -m cp \
            "gs://${GCS_BUCKET}/snapshots/*/all-districts-rankings.json" \
            /tmp/rank-history-src/ 2>/dev/null || true

          # gsutil flattens paths — files are named like
          # snapshots_2024-01-15_all-districts-rankings.json
          RANK_FILE_COUNT=$(ls /tmp/rank-history-src/*.json 2>/dev/null | wc -l | tr -d ' ')
          echo "Downloaded ${RANK_FILE_COUNT} historical rankings files"

          if [ "${RANK_FILE_COUNT}" -gt "0" ]; then
            node -e "
              const fs = require('fs');
              const path = require('path');
              const srcDir = '/tmp/rank-history-src';
              const outDir = '/tmp/rank-history-out';

              // Build per-district index from all rankings files
              const index = new Map();
              const files = fs.readdirSync(srcDir).filter(f => f.endsWith('.json'));

              for (const file of files) {
                try {
                  const data = JSON.parse(fs.readFileSync(path.join(srcDir, file), 'utf-8'));
                  const date = data.metadata?.sourceCsvDate;
                  if (!date || !data.rankings) continue;

                  for (const r of data.rankings) {
                    if (!index.has(r.districtId)) {
                      index.set(r.districtId, {
                        districtId: r.districtId,
                        districtName: r.districtName,
                        history: []
                      });
                    }
                    const entry = index.get(r.districtId);
                    if (entry.districtName === 'District ' + r.districtId) {
                      entry.districtName = r.districtName;
                    }
                    entry.history.push({
                      date,
                      aggregateScore: r.aggregateScore,
                      clubsRank: r.clubsRank,
                      paymentsRank: r.paymentsRank,
                      distinguishedRank: r.distinguishedRank,
                      totalDistricts: data.metadata.totalDistricts,
                      overallRank: r.overallRank ?? 0
                    });
                  }
                } catch (e) {
                  console.error('Skipping ' + file + ': ' + e.message);
                }
              }

              // Sort, deduplicate, and write each district
              let totalPoints = 0;
              for (const [id, entry] of index) {
                entry.history.sort((a, b) => a.date.localeCompare(b.date));
                const seen = new Set();
                entry.history = entry.history.filter(p => {
                  if (seen.has(p.date)) return false;
                  seen.add(p.date);
                  return true;
                });
                totalPoints += entry.history.length;
                fs.writeFileSync(
                  path.join(outDir, id + '.json'),
                  JSON.stringify(entry)
                );
              }
              console.log('Generated rank history for ' + index.size +
                ' districts (' + totalPoints + ' total points)');
            "

            # Upload all rank history files with 5-min TTL
            gsutil -m \
              -h "Content-Type:application/json" \
              -h "Cache-Control:public, max-age=300" \
              cp -r "/tmp/rank-history-out/*.json" \
              "gs://${GCS_BUCKET}/v1/rank-history/"
          else
            echo "::warning::No historical rankings found, skipping rank history generation"
          fi

          echo "## 📋 CDN Manifests" >> "$GITHUB_STEP_SUMMARY"
          echo "- **v1/latest.json**: ${DATE}" >> "$GITHUB_STEP_SUMMARY"
          DATE_COUNT=$(wc -l < /tmp/all-dates.txt | tr -d ' ')
          echo "- **v1/dates.json**: ${DATE_COUNT} dates" >> "$GITHUB_STEP_SUMMARY"

      # ── Step 6: Update district-snapshot-index (#138) ──────
      # The backend reads per-district cached dates from this
      # pre-computed index. Without updating it, the district
      # detail page date selector goes stale.
      - name: Update district-snapshot-index
        env:
          GCS_BUCKET: 'toast-stats-data-ca'
        run: |
          DATE="${{ steps.scrape.outputs.date }}"
          DISTRICT_LIST="${{ steps.config.outputs.districts }}"
          INDEX_PATH="gs://${GCS_BUCKET}/config/district-snapshot-index.json"

          echo "Updating district-snapshot-index for ${DATE}..."

          # Download existing index (or start empty)
          gsutil cp "${INDEX_PATH}" /tmp/district-snapshot-index.json 2>/dev/null || \
            echo '{"generatedAt":"","districts":{}}' > /tmp/district-snapshot-index.json

          # Update the index with today's date for each district
          node -e "
            const fs = require('fs');
            const index = JSON.parse(fs.readFileSync('/tmp/district-snapshot-index.json', 'utf-8'));
            const date = '${DATE}';
            const districts = '${DISTRICT_LIST}'.split(',').map(d => d.trim());

            for (const districtId of districts) {
              const existing = index.districts[districtId] || [];
              const dateSet = new Set(existing);
              dateSet.add(date);
              index.districts[districtId] = [...dateSet].sort();
            }
            index.generatedAt = new Date().toISOString();

            fs.writeFileSync('/tmp/district-snapshot-index.json', JSON.stringify(index, null, 2));
            console.log('Updated index for ' + districts.length + ' districts with date ' + date);
          "

          # Upload updated index with CDN-aware metadata (changes daily, short TTL)
          gsutil \
            -h "Content-Type:application/json" \
            -h "Cache-Control:public, max-age=300" \
            cp /tmp/district-snapshot-index.json "${INDEX_PATH}"

          echo "## 📋 District Snapshot Index" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Updated for date**: ${DATE}" >> "$GITHUB_STEP_SUMMARY"
          DISTRICT_COUNT=$(echo "${DISTRICT_LIST}" | tr ',' '\n' | wc -l | tr -d ' ')
          echo "- **Districts updated**: ${DISTRICT_COUNT}" >> "$GITHUB_STEP_SUMMARY"

      # ── Summary ─────────────────────────────────────────────
      - name: Pipeline summary
        if: always()
        run: |
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "---" >> "$GITHUB_STEP_SUMMARY"
          SCRAPE_DATE="${{ steps.scrape.outputs.date }}"
          TIMESTAMP=$(date -u +%H:%M' UTC')
          LINE="🏁 Pipeline completed for"
          LINE="$LINE \`${SCRAPE_DATE}\`"
          LINE="$LINE at ${TIMESTAMP}"
          echo "$LINE" >> "$GITHUB_STEP_SUMMARY"
